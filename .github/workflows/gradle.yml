name: Java CI with Gradle

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1. Code aus dem Repository auschecken
      - name: Checkout Code
        uses: actions/checkout@v4

      # 2. JDK zuerst einrichten (wichtig für den Formatter!)
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # 3. Code-Formatierung prüfen (bricht ab, wenn Stil verletzt wurde)
      - name: Verify Google Java Format
        uses: axel-op/googlejavaformat-action@v4
        with:
          # skip-commit: true stellt sicher, dass die Action NUR prüft.
          # Wenn Code unformatiert ist, schlägt dieser CI-Schritt fehl.
          skip-commit: true

      # 4. Berechtigungen für den Gradle Wrapper setzen
      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      # 5. Gradle Umgebung initialisieren
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      # 6. Kompilieren und Testen
      - name: Build with Gradle Wrapper
        run: ./gradlew build
